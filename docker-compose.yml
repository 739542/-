services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: campus-market-app
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
    environment:
      SERVER_PORT: ${SERVER_PORT:-8080}
      DB_HOST: ${DB_HOST:-mysql}
      DB_PORT: ${DB_PORT:-3306}
      DB_NAME: ${DB_NAME:-campus_market}
      DB_USERNAME: ${DB_USERNAME:-campus}
      DB_PASSWORD: ${DB_PASSWORD:-123456}
      REDIS_HOST: ${REDIS_HOST:-redis}
      REDIS_PORT: ${REDIS_PORT:-6379}
      MAIL_HOST: ${MAIL_HOST:-smtp.qq.com}
      MAIL_USERNAME: ${MAIL_USERNAME:-}
      MAIL_PASSWORD: ${MAIL_PASSWORD:-}
      FILE_BASE_PATH: ${FILE_BASE_PATH:-/opt/campus-market/images/}
      JPA_DDL_AUTO: ${JPA_DDL_AUTO:-update}
      JPA_SHOW_SQL: ${JPA_SHOW_SQL:-false}
      THYMELEAF_CACHE: ${THYMELEAF_CACHE:-true}
    ports:
      - "8080:8080"
    volumes:
      - campus_images:/opt/campus-market/images
    restart: unless-stopped

  mysql:
    image: mysql:8.0
    container_name: campus-market-mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root123456}
      MYSQL_DATABASE: ${DB_NAME:-campus_market}
      MYSQL_USER: ${DB_USERNAME:-campus}
      MYSQL_PASSWORD: ${DB_PASSWORD:-123456}
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./db_secondhandtrade.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-p${MYSQL_ROOT_PASSWORD:-root123456}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: campus-market-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped

volumes:
  campus_images:
  mysql_data:
  redis_data:
