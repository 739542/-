<!DOCTYPE html>

<!--suppress ALL-->

<html lang="en">

<head>

    <meta charset="UTF-8">

    <title>留言管理</title>

    <link rel="stylesheet" type="text/css" href="/static/jquery-easyui-1.7.0/themes/metro-blue/easyui.css">

    <link rel="stylesheet" type="text/css" href="/static/jquery-easyui-1.7.0/themes/icon.css">

    <script type="text/javascript" src="/static/jquery-easyui-1.7.0/jquery.min.js"></script>

    <script type="text/javascript" src="/static/jquery-easyui-1.7.0/jquery.easyui.min.js"></script>

    <script type="text/javascript" src="/static/jquery-easyui-1.7.0/locale/easyui-lang-zh_CN.js"></script>

    <script type="text/javascript">
        var url;

        function searchContact() {
            $("#dg").datagrid('load', {
                "userName": $("#s_userName").val()
            });
        }

        // 打开回复对话框
        function openContactReplyDialog() {
            var selectedRows = $("#dg").datagrid("getSelections");
            if (selectedRows.length != 1) {
                $.messager.alert("系统提示", "请选择一条要回复的留言！");
                return;
            }
            var row = selectedRows[0];
            $("#dlg").dialog("open").dialog("setTitle", "回复留言");

            // 加载原有数据，重点是 ID 和已有的回复内容
            $("#fm").form("load", row);

            url = "/admin/feedback/reply";
        }

        // 保存回复
        function saveContact() {
            $("#fm").form("submit", {
                url: url,
                onSubmit: function() {
                    return $(this).form("validate");
                },
                success: function(result) {
                    var result = eval('(' + result + ')');
                    if (result.success) {
                        $.messager.alert("系统提示", "回复成功！");
                        resetValue();
                        $("#dlg").dialog("close");
                        $("#dg").datagrid("reload");
                    } else {
                        $.messager.alert("系统提示", "回复失败！");
                    }
                }
            });
        }

        function resetValue() {
            $("#reply").val("");
        }

        function closeContactDialog() {
            $("#dlg").dialog("close");
            resetValue();
        }

        function deleteContact() {
            var selectedRows = $("#dg").datagrid("getSelections");
            if (selectedRows.length == 0) {
                $.messager.alert("系统提示", "请选择要删除的数据！");
                return;
            }
            var strIds = [];
            for (var i = 0; i < selectedRows.length; i++) {
                strIds.push(selectedRows[i].id);
            }
            var ids = strIds.join(",");
            $.messager.confirm("系统提示", "您确定要删除这<font color=red>" + selectedRows.length + "</font>条数据吗？", function(r) {
                if (r) {
                    $.post("/admin/feedback/delete", {ids: ids}, function(result) {
                        if (result.success) {
                            $.messager.alert("系统提示", "数据已成功删除！");
                            $("#dg").datagrid("reload");
                        } else {
                            $.messager.alert("系统提示", "数据删除失败，请联系管理员！");
                        }
                    }, "json");
                }
            });
        }
    </script>
</head>
<body style="margin: 1px">
<table id="dg" title="留言反馈管理" class="easyui-datagrid"
       fitColumns="true" pagination="true" rownumbers="true"
       url="/admin/feedback/list" fit="true" toolbar="#tb">
    <thead>
    <tr>
        <th field="cb" checkbox="true" align="center"></th>
        <th field="id" width="20" align="center">ID</th>
        <th field="userName" width="50" align="center">留言用户</th>
        <th field="content" width="200" align="center">留言内容</th>
        <th field="reply" width="200" align="center">管理员回复</th>
        <th field="createTime" width="80" align="center">留言时间</th>
    </tr>
    </thead>
</table>

<div id="tb">
    <div>
        <a href="javascript:openContactReplyDialog()" class="easyui-linkbutton" iconCls="icon-edit" plain="true">回复</a>
        <a href="javascript:deleteContact()" class="easyui-linkbutton" iconCls="icon-remove" plain="true">删除</a>
    </div>
    <div>
        &nbsp;用户名：<input type="text" id="s_userName" size="20" onkeydown="if(event.keyCode==13) searchContact()"/>
        <a href="javascript:searchContact()" class="easyui-linkbutton" iconCls="icon-search" plain="true">搜索</a>
    </div>
</div>

<div id="dlg" class="easyui-dialog" style="width: 500px;height: 300px;padding: 10px 20px"
     closed="true" buttons="#dlg-buttons">
    <form id="fm" method="post">
        <input type="hidden" name="id" />
        <table cellspacing="8px">
            <tr>
                <td valign="top">留言内容：</td>
                <td>
                    <textarea name="content" rows="4" cols="40" readonly="readonly" style="background-color: #f0f0f0;"></textarea>
                </td>
            </tr>
            <tr>
                <td valign="top">回复内容：</td>
                <td>
                    <textarea id="reply" name="reply" rows="4" cols="40" class="easyui-validatebox" required="true"></textarea>
                </td>
            </tr>
        </table>
    </form>
</div>

<div id="dlg-buttons">
    <a href="javascript:saveContact()" class="easyui-linkbutton" iconCls="icon-ok">保存</a>
    <a href="javascript:closeContactDialog()" class="easyui-linkbutton" iconCls="icon-cancel">关闭</a>
</div>
</body>
</html>
