<!DOCTYPE html>

<!--suppress ALL-->

<html lang="en">

<head>

    <meta charset="UTF-8">

    <title>商品管理</title>

    <link rel="stylesheet" type="text/css" href="/static/jquery-easyui-1.7.0/themes/metro-blue/easyui.css"/>

    <link rel="stylesheet" type="text/css" href="/static/jquery-easyui-1.7.0/themes/icon.css"/>

    <script type="text/javascript" src="/static/jquery-easyui-1.7.0/jquery.min.js"></script>

    <script type="text/javascript" src="/static/jquery-easyui-1.7.0/jquery.easyui.min.js"></script>

    <script type="text/javascript" src="/static/jquery-easyui-1.7.0/locale/easyui-lang-zh_CN.js"></script>

    <script type="text/javascript" src="/static/ckeditor/ckeditor.js"></script>

    <script type="text/javascript">

        // 格式化状态显示
        function formatStatus(val, row) {
            if (val == 0) return '<span style="color:orange;">待审核</span>';
            if (val == 1) return '<span style="color:green;">已上架</span>';
            if (val == 2) return '<span style="color:red;">已驳回</span>';
            if (val == 3) return '<span style="color:gray;">已下架</span>';
            if (val == 4) return '<span style="color:blue;">已预订</span>';
            if (val == 5) return '<span style="color:black;">已售出</span>';
            return val;
        }

        // 格式化推荐状态
        function formatRecommend(val, row) {
            if (val == 1) return '<span style="color:green;font-weight:bold;">是</span>';
            return '否';
        }

        // 搜索功能
        function searchItem() {
            $("#dg").datagrid('load', {
                "name": $("#s_name").val(),
                "userName": $("#s_seller").val(), // 后端接收 userName 字段用于查找 seller
                "status": $("#s_status").combobox("getValue")
            });
        }

        // 删除功能
        function deleteItem() {
            var selectedRows = $("#dg").datagrid("getSelections");
            if (selectedRows.length == 0) {
                $.messager.alert("系统提示", "请选择要删除的数据！");
                return;
            }
            var strIds = [];
            for (var i = 0; i < selectedRows.length; i++) {
                strIds.push(selectedRows[i].id);
            }
            var ids = strIds.join(",");
            $.messager.confirm("系统提示", "您确定要删除这<font color=red>" + selectedRows.length + "</font>条数据吗？", function(r) {
                if (r) {
                    $.post("/admin/item/delete", {ids: ids}, function(result) {
                        if (result.success) {
                            $.messager.alert("系统提示", "数据已成功删除！");
                            $("#dg").datagrid("reload");
                        } else {
                            $.messager.alert("系统提示", "数据删除失败，请联系管理员！");
                        }
                    }, "json");
                }
            });
        }

        // 统一的状态更新函数
        function updateStatus(status, isRecommended) {
            var selectedRows = $("#dg").datagrid("getSelections");
            if (selectedRows.length == 0) {
                $.messager.alert("系统提示", "请选择要操作的数据！");
                return;
            }

            // 由于后端接口 updateStatus 设计为接收单个 id，这里我们循环处理或提示只能选一个
            // 为了稳妥，建议一次操作一个，或者修改后端支持 ids。这里按单条处理逻辑写：
            if (selectedRows.length > 1) {
                $.messager.alert("系统提示", "请选择一条数据进行操作！");
                return;
            }

            var id = selectedRows[0].id;

            $.post("/admin/item/updateStatus", {
                id: id,
                status: status,
                isRecommended: isRecommended
            }, function(result) {
                if (result.success) {
                    $.messager.alert("系统提示", "操作成功！");
                    $("#dg").datagrid("reload");
                } else {
                    $.messager.alert("系统提示", "操作失败！");
                }
            }, "json");
        }

        // 按钮绑定的快捷函数
        function auditPass() { updateStatus(1, null); }
        function auditReject() { updateStatus(2, null); }
        function offShelf() { updateStatus(3, null); }
        function setRecommend() { updateStatus(null, 1); }
        function cancelRecommend() { updateStatus(null, 0); }

    </script>
</head>
<body style="margin: 1px">
<table id="dg" title="闲置物品管理" class="easyui-datagrid"
       fitColumns="true" pagination="true" rownumbers="true"
       url="/admin/item/list" fit="true" toolbar="#tb">
    <thead>
    <tr>
        <th field="cb" checkbox="true" align="center"></th>
        <th field="id" width="20" align="center">ID</th>
        <th field="name" width="100" align="center">物品名称</th>
        <th field="categoryName" width="50" align="center">所属分类</th>
        <th field="sellerName" width="50" align="center">卖家</th>
        <th field="price" width="30" align="center">价格</th>
        <th field="status" width="40" align="center" formatter="formatStatus">状态</th>
        <th field="releaseTime" width="80" align="center">发布时间</th>
        <th field="viewCount" width="30" align="center">浏览量</th>
        <th field="isRecommended" width="30" align="center" formatter="formatRecommend">是否推荐</th>
    </tr>
    </thead>
</table>

<div id="tb">
    <div>
        <a href="javascript:auditPass()" class="easyui-linkbutton" iconCls="icon-ok" plain="true">审核通过/上架</a>
        <a href="javascript:auditReject()" class="easyui-linkbutton" iconCls="icon-no" plain="true">驳回</a>
        <a href="javascript:offShelf()" class="easyui-linkbutton" iconCls="icon-lock" plain="true">下架</a>
        <span style="margin-left:10px;">|</span>
        <a href="javascript:setRecommend()" class="easyui-linkbutton" iconCls="icon-add" plain="true">设为推荐</a>
        <a href="javascript:cancelRecommend()" class="easyui-linkbutton" iconCls="icon-remove" plain="true">取消推荐</a>
        <span style="margin-left:10px;">|</span>
        <a href="javascript:deleteItem()" class="easyui-linkbutton" iconCls="icon-cancel" plain="true">删除</a>
    </div>
    <div>
        &nbsp;物品名称：<input type="text" id="s_name" size="20" onkeydown="if(event.keyCode==13) searchItem()"/>
        &nbsp;卖家名称：<input type="text" id="s_seller" size="20" onkeydown="if(event.keyCode==13) searchItem()"/>
        &nbsp;状态：
        <select class="easyui-combobox" id="s_status" editable="false" panelHeight="auto" style="width:100px;">
            <option value="">全部</option>
            <option value="0">待审核</option>
            <option value="1">已上架</option>
            <option value="2">已驳回</option>
            <option value="3">已下架</option>
            <option value="4">已预订</option>
            <option value="5">已售出</option>
        </select>
        <a href="javascript:searchItem()" class="easyui-linkbutton" iconCls="icon-search" plain="true">搜索</a>
    </div>
</div>
</body>
</html>
