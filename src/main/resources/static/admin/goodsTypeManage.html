<!DOCTYPE html>

<!--suppress ALL-->

<html lang="en">

<head>

    <meta charset="UTF-8">

    <title>商品类别管理</title>

    <link rel="stylesheet" type="text/css" href="/static/jquery-easyui-1.7.0/themes/metro-blue/easyui.css">

    <link rel="stylesheet" type="text/css" href="/static/jquery-easyui-1.7.0/themes/icon.css">

    <script type="text/javascript" src="/static/jquery-easyui-1.7.0/jquery.min.js"></script>

    <script type="text/javascript" src="/static/jquery-easyui-1.7.0/jquery.easyui.min.js"></script>

    <script type="text/javascript" src="/static/jquery-easyui-1.7.0/locale/easyui-lang-zh_CN.js"></script>

    <script type="text/javascript">

        var url;

        function searchGoodsType() {
            $("#dg").datagrid('load', {
                "name": $("#s_typeName").val()
            });
        }

        function openGoodsTypeAddDialog() {
            $("#dlg").dialog("open").dialog("setTitle", "添加物品分类信息");
            url = "/admin/category/save";
        }

        function openGoodsTypeModifyDialog() {
            var selectedRows = $("#dg").datagrid("getSelections");
            if (selectedRows.length != 1) {
                $.messager.alert("系统提示", "请选择一条要编辑的数据！");
                return;
            }
            var row = selectedRows[0];
            $("#dlg").dialog("open").dialog("setTitle", "编辑物品分类信息");
            $("#fm").form("load", row);
            url = "/admin/category/save?id=" + row.id;
        }

        function saveGoodsType() {
            $("#fm").form("submit", {
                url: url,
                onSubmit: function() {
                    return $(this).form("validate");
                },
                success: function(result) {
                    var result = eval('(' + result + ')');
                    if (result.success) {
                        $.messager.alert("系统提示", "保存成功！");
                        resetValue();
                        $("#dlg").dialog("close");
                        $("#dg").datagrid("reload");
                    } else {
                        $.messager.alert("系统提示", "保存失败！");
                        return;
                    }
                }
            });
        }

        function resetValue() {
            $("#typeName").val("");
            $("#sort").numberbox("setValue", "");
        }

        function closeGoodsTypeDialog() {
            $("#dlg").dialog("close");
            resetValue();
        }

        function deleteGoodsType() {
            var selectedRows = $("#dg").datagrid("getSelections");
            if (selectedRows.length == 0) {
                $.messager.alert("系统提示", "请选择要删除的数据！");
                return;
            }
            var strIds = [];
            for (var i = 0; i < selectedRows.length; i++) {
                strIds.push(selectedRows[i].id);
            }
            var ids = strIds.join(",");
            $.messager.confirm("系统提示", "您确定要删除这<font color=red>" + selectedRows.length + "</font>条数据吗？", function(r) {
                if (r) {
                    $.post("/admin/category/delete", {ids: ids}, function(result) {
                        if (result.success) {
                            $.messager.alert("系统提示", "数据已成功删除！");
                            $("#dg").datagrid("reload");
                        } else {
                            $.messager.alert("系统提示", "数据删除失败，请联系管理员！");
                        }
                    }, "json");
                }
            });
        }
    </script>
</head>
<body style="margin: 1px">
<table id="dg" title="物品分类管理" class="easyui-datagrid"
       fitColumns="true" pagination="true" rownumbers="true"
       url="/admin/category/list" fit="true" toolbar="#tb">
    <thead>
    <tr>
        <th field="cb" checkbox="true" align="center"></th>
        <th field="id" width="20" align="center">ID</th>
        <th field="name" width="100" align="center">分类名称</th>
        <th field="sortOrder" width="50" align="center">排序序号</th>
    </tr>
    </thead>
</table>

<div id="tb">
    <div>
        <a href="javascript:openGoodsTypeAddDialog()" class="easyui-linkbutton" iconCls="icon-add" plain="true">添加</a>
        <a href="javascript:openGoodsTypeModifyDialog()" class="easyui-linkbutton" iconCls="icon-edit" plain="true">修改</a>
        <a href="javascript:deleteGoodsType()" class="easyui-linkbutton" iconCls="icon-remove" plain="true">删除</a>
    </div>
    <div>
        &nbsp;分类名称：<input type="text" id="s_typeName" size="20" onkeydown="if(event.keyCode==13) searchGoodsType()"/>
        <a href="javascript:searchGoodsType()" class="easyui-linkbutton" iconCls="icon-search" plain="true">搜索</a>
    </div>
</div>

<div id="dlg" class="easyui-dialog" style="width: 400px;height: 200px;padding: 10px 20px"
     closed="true" buttons="#dlg-buttons">
    <form id="fm" method="post">
        <table cellspacing="8px">
            <tr>
                <td>分类名称：</td>
                <td><input type="text" id="typeName" name="name" class="easyui-validatebox" required="true"/></td>
            </tr>
            <tr>
                <td>排序序号：</td>
                <td><input type="text" id="sort" name="sortOrder" class="easyui-numberbox" required="true" style="width: 60px;"/></td>
            </tr>
        </table>
    </form>
</div>

<div id="dlg-buttons">
    <a href="javascript:saveGoodsType()" class="easyui-linkbutton" iconCls="icon-ok">保存</a>
    <a href="javascript:closeGoodsTypeDialog()" class="easyui-linkbutton" iconCls="icon-cancel">关闭</a>
</div>
</body>
</html>
