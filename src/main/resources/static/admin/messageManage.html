<!DOCTYPE html>

<!--suppress ALL-->

<html lang="en">

<head>

    <meta charset="UTF-8">

    <title>消息管理</title>

    <link rel="stylesheet" type="text/css" href="/static/jquery-easyui-1.7.0/themes/metro-blue/easyui.css">

    <link rel="stylesheet" type="text/css" href="/static/jquery-easyui-1.7.0/themes/icon.css">

    <script type="text/javascript" src="/static/jquery-easyui-1.7.0/jquery.min.js"></script>

    <script type="text/javascript" src="/static/jquery-easyui-1.7.0/jquery.easyui.min.js"></script>

    <script type="text/javascript" src="/static/jquery-easyui-1.7.0/locale/easyui-lang-zh_CN.js"></script>

    <script type="text/javascript">

        function searchMessage() {
            $("#dg").datagrid('load', {
                "userName": $("#s_userName").val() // 后端接收 userName 用于查找 userId
            });
        }

        function deleteMessage() {
            var selectedRows = $("#dg").datagrid("getSelections");
            if (selectedRows.length == 0) {
                $.messager.alert("系统提示", "请选择要删除的数据！");
                return;
            }
            var strIds = [];
            for (var i = 0; i < selectedRows.length; i++) {
                strIds.push(selectedRows[i].id);
            }
            var ids = strIds.join(",");
            $.messager.confirm("系统提示", "您确定要删除这<font color=red>" + selectedRows.length + "</font>条数据吗？", function(r) {
                if (r) {
                    $.post("/admin/notification/delete", {ids: ids}, function(result) {
                        if (result.success) {
                            $.messager.alert("系统提示", "数据已成功删除！");
                            $("#dg").datagrid("reload");
                        } else {
                            $.messager.alert("系统提示", "数据删除失败，请联系管理员！");
                        }
                    }, "json");
                }
            });
        }
    </script>
</head>
<body style="margin: 1px">
<table id="dg" title="系统消息/通知管理" class="easyui-datagrid"
       fitColumns="true" pagination="true" rownumbers="true"
       url="/admin/notification/list" fit="true" toolbar="#tb">
    <thead>
    <tr>
        <th field="cb" checkbox="true" align="center"></th>
        <th field="id" width="20" align="center">ID</th>
        <th field="userName" width="50" align="center">接收用户</th>
        <th field="content" width="200" align="center">消息内容</th>
        <th field="createTime" width="80" align="center">发送时间</th>
    </tr>
    </thead>
</table>

<div id="tb">
    <div>
        <a href="javascript:deleteMessage()" class="easyui-linkbutton" iconCls="icon-remove" plain="true">删除</a>
    </div>
    <div>
        &nbsp;用户名：<input type="text" id="s_userName" size="20" onkeydown="if(event.keyCode==13) searchMessage()"/>
        <a href="javascript:searchMessage()" class="easyui-linkbutton" iconCls="icon-search" plain="true">搜索</a>
    </div>
</div>
</body>
</html>
