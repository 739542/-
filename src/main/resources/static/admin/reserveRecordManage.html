<!DOCTYPE html>

<!--suppress ALL-->

<html lang="en">

<head>

    <meta charset="UTF-8">

    <title>预订记录管理</title>

    <link rel="stylesheet" type="text/css" href="/static/jquery-easyui-1.7.0/themes/metro-blue/easyui.css">

    <link rel="stylesheet" type="text/css" href="/static/jquery-easyui-1.7.0/themes/icon.css">

    <script type="text/javascript" src="/static/jquery-easyui-1.7.0/jquery.min.js"></script>

    <script type="text/javascript" src="/static/jquery-easyui-1.7.0/jquery.easyui.min.js"></script>

    <script type="text/javascript" src="/static/jquery-easyui-1.7.0/locale/easyui-lang-zh_CN.js"></script>

    <script type="text/javascript">

        function formatStatus(val, row){
            // 0-交易中, 1-已取消, 2-完成
            if(val == 0) return '<span style="color:blue">交易中</span>';
            if(val == 1) return '<span style="color:gray">已取消</span>';
            if(val == 2) return '<span style="color:green">已完成</span>';
            return val;
        }

        // 搜索（虽然当前后端只支持对象搜索，这里简单实现重载）
        function searchOrder() {
            $("#dg").datagrid('load', {
                // 如果需要，可以在这里扩展搜索参数，目前后端支持 TradeOrder 实体属性搜索
            });
        }

        function deleteOrder() {
            var selectedRows = $("#dg").datagrid("getSelections");
            if (selectedRows.length == 0) {
                $.messager.alert("系统提示", "请选择要删除的数据！");
                return;
            }
            var strIds = [];
            for (var i = 0; i < selectedRows.length; i++) {
                strIds.push(selectedRows[i].id);
            }
            var ids = strIds.join(",");
            $.messager.confirm("系统提示", "删除订单将可能导致关联商品重新上架，确定删除吗？", function(r) {
                if (r) {
                    $.post("/admin/order/delete", {ids: ids}, function(result) {
                        if (result.success) {
                            $.messager.alert("系统提示", "数据已成功删除！");
                            $("#dg").datagrid("reload");
                        } else {
                            $.messager.alert("系统提示", "数据删除失败，请联系管理员！");
                        }
                    }, "json");
                }
            });
        }
    </script>
</head>
<body style="margin: 1px">
<table id="dg" title="订单/交易记录管理" class="easyui-datagrid"
       fitColumns="true" pagination="true" rownumbers="true"
       url="/admin/order/list" fit="true" toolbar="#tb">
    <thead>
    <tr>
        <th field="cb" checkbox="true" align="center"></th>
        <th field="id" width="20" align="center">ID</th>
        <th field="itemName" width="100" align="center">商品名称</th>
        <th field="buyerName" width="50" align="center">购买人</th>
        <th field="createTime" width="100" align="center">交易时间</th>
        <th field="status" width="50" align="center" formatter="formatStatus">状态</th>
    </tr>
    </thead>
</table>

<div id="tb">
    <div>
        <a href="javascript:deleteOrder()" class="easyui-linkbutton" iconCls="icon-remove" plain="true">删除订单</a>
    </div>
</div>
</body>
</html>
