<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>找回密码</title>
</head>
<body>
<div id="b">
  <div class="container" style="margin-top: 50px; max-width: 600px;">
    <div class="card shadow">
      <div class="card-header bg-warning text-white">
        <h4 class="mb-0"><i class="fa fa-key"></i> 找回密码</h4>
      </div>
      <div class="card-body">
        <form id="resetForm">
          <div class="form-group">
            <label>用户名</label>
            <input type="text" class="form-control" id="username" placeholder="请输入您的用户名" required>
          </div>
          <div class="form-group">
            <label>注册邮箱</label>
            <div class="input-group">
              <input type="email" class="form-control" id="email" placeholder="请输入绑定的邮箱" required>
              <div class="input-group-append">
                <button class="btn btn-info" type="button" id="sendBtn" onclick="sendCode()">获取验证码</button>
              </div>
            </div>
            <small class="form-text text-muted">验证码将发送到您的邮箱，请注意查收（可能在垃圾箱）。</small>
          </div>

          <div class="form-group">
            <label>邮箱验证码</label>
            <input type="text" class="form-control" id="verifyCode" placeholder="请输入6位验证码" required>
          </div>
          <div class="form-group">
            <label>设置新密码</label>
            <input type="password" class="form-control" id="newPassword" placeholder="请输入新密码" required>
          </div>

          <div class="text-center mt-4">
            <button type="button" class="btn btn-primary btn-block" onclick="submitReset()">重置密码</button>
            <a href="/login" class="btn btn-link mt-2">想起密码了？去登录</a>
          </div>
        </form>
      </div>
    </div>
  </div>

  <script>
    // 发送验证码
    function sendCode() {
      var username = $("#username").val();
      var email = $("#email").val();

      if (!username || !email) {
        alert("请先填写用户名和邮箱！");
        return;
      }

      // 倒计时 UI
      var btn = $("#sendBtn");
      btn.attr("disabled", true);
      var count = 60;
      var timer = setInterval(function () {
        count--;
        btn.text(count + "秒后重发");
        if (count <= 0) {
          clearInterval(timer);
          btn.attr("disabled", false);
          btn.text("获取验证码");
        }
      }, 1000);

      // 发送请求
      $.post("/user/sendResetCode", {
        username: username,
        email: email
      }, function (res) {
        if (res.success) {
          alert("验证码已发送，请查收邮件！");
        } else {
          alert(res.errorInfo);
          // 失败了立即恢复按钮
          clearInterval(timer);
          btn.attr("disabled", false);
          btn.text("获取验证码");
        }
      });
    }

    // 提交重置
    function submitReset() {
      var verifyCode = $("#verifyCode").val();
      var newPassword = $("#newPassword").val();

      if (!verifyCode || !newPassword) {
        alert("请填写验证码和新密码！");
        return;
      }

      $.post("/user/doResetPassword", {
        verifyCode: verifyCode,
        newPassword: newPassword
      }, function (res) {
        if (res.success) {
          alert("密码重置成功！请使用新密码登录。");
          window.location.href = "/login";
        } else {
          alert(res.errorInfo);
        }
      });
    }
  </script>
</div>
</body>
</html>
