<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>我的商品</title>
</head>
<body>
<div id="b">
    <div class="row" style="margin-top: 5px">
        <div class="col-md-3">
            <div th:replace="~{common/menuPersonalHubs::#m}"></div>
        </div>
        <div class="col-md-9">
            <ol class="breadcrumb">
                <li class="breadcrumb-item"><a href="/">首页</a></li>
                <li class="breadcrumb-item"><a href="/user/center">个人中心</a></li>
                <li class="breadcrumb-item active">我的商品</li>
            </ol>

            <form action="/item/my" method="post" class="form-inline mb-3">
                <div class="form-group mr-2">
                    <input type="text" class="form-control" name="name" th:value="${name}" placeholder="商品名称...">
                </div>
                <div class="form-group mr-2">
                    <select name="categoryId" class="form-control">
                        <option value="">所有分类</option>
                        <option th:each="t : ${goodsTypeList}" th:value="${t.id}" th:text="${t.name}"
                                th:selected="${categoryId == t.id}"></option>
                    </select>
                </div>
                <div class="form-group mr-2">
                    <select name="status" class="form-control">
                        <option value="">所有状态</option>
                        <option value="1" th:selected="${status==1}">上架中</option>
                        <option value="3" th:selected="${status==3}">已下架</option>
                        <option value="4" th:selected="${status==4}">已预订</option>
                        <option value="5" th:selected="${status==5}">已售出</option>
                    </select>
                </div>
                <button type="submit" class="btn btn-primary"><i class="fa fa-search"></i> 搜索</button>
            </form>

            <span th:if="${goodsList.size()!=0}" style="float: right; color: red;">当前有 <span th:text="${goodsList.size()}"></span> 条数据</span>

            <table class="table table-bordered table-striped table-hover" th:if="${goodsList.size()!=0}">
                <thead>
                <tr>
                    <th>发布时间</th>
                    <th>名称</th>
                    <th>类别</th>
                    <th>状态</th>
                    <th>操作</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="goods:${goodsList}">
                    <td th:text="${#dates.format(goods.releaseTime,'yyyy-MM-dd HH:mm:ss')}"></td>
                    <td>
                        <a th:href="@{'/item/detail/'+${goods.id}}" th:text="${#strings.abbreviate(goods.name,15)}" target="_blank"></a>
                    </td>
                    <td th:text="${goods.categoryName}"></td>
                    <td>
                        <span th:if="${goods.status==0}" class="text-warning">待审核</span>
                        <span th:if="${goods.status==1}" class="text-success">上架中</span>
                        <span th:if="${goods.status==2}" class="text-danger">审核失败</span>
                        <span th:if="${goods.status==3}" class="text-secondary">已下架</span>
                        <span th:if="${goods.status==4}" class="text-info">已预订</span>
                        <span th:if="${goods.status==5}" class="text-success">已售出</span>
                    </td>
                    <td>
                        <button type="button" class="btn btn-info btn-sm"
                                th:if="${goods.status!=4 && goods.status!=5}"
                                th:onclick="openModifyModal([[${goods.id}]], [[${goods.name}]], [[${goods.categoryId}]], [[${goods.price}]], [[${goods.description}]])">
                            <i class="fa fa-pencil"></i>
                        </button>

                        <a th:if="${goods.status==1}" th:href="@{/item/updateStatus(id=${goods.id}, status=3)}" class="btn btn-secondary btn-sm" title="下架">
                            <i class="fa fa-arrow-down"></i>
                        </a>
                        <a th:if="${goods.status==3}" th:href="@{/item/updateStatus(id=${goods.id}, status=1)}" class="btn btn-warning btn-sm" title="上架">
                            <i class="fa fa-arrow-up"></i>
                        </a>
                        <a th:if="${goods.status==4}" th:href="@{/item/updateStatus(id=${goods.id}, status=5)}" class="btn btn-success btn-sm" title="确认交易完成" onclick="return confirm('确认交易已完成？')">
                            <i class="fa fa-check"></i>
                        </a>
                        <a th:if="${goods.status==0 || goods.status==2 || goods.status==3}"
                           th:href="@{/item/delete(id=${goods.id})}"
                           class="btn btn-danger btn-sm" onclick="return confirm('确定删除吗？')">
                            <i class="fa fa-trash"></i>
                        </a>
                    </td>
                </tr>
                </tbody>
            </table>
            <div th:if="${goodsList.size()==0}" class="alert alert-warning">暂无数据</div>
        </div>
    </div>

    <div class="modal fade" id="myModalModify">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header">
                    <h4 class="modal-title">编辑商品</h4>
                    <button type="button" class="close" data-dismiss="modal">&times;</button>
                </div>
                <div class="modal-body">
                    <form role="form" method="post" action="/item/save" enctype="multipart/form-data" onsubmit="return syncEditorContent()">
                        <input type="hidden" id="modifyId" name="id">
                        <div class="form-group">
                            <label>商品名称</label>
                            <input type="text" class="form-control" id="modifyName" name="name" required>
                        </div>
                        <div class="form-group">
                            <label>分类</label>
                            <select id="modifyCategory" name="categoryId" class="form-control" required>
                                <option th:each="t : ${goodsTypeList}" th:value="${t.id}" th:text="${t.name}"></option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>价格</label>
                            <input type="number" step="0.01" class="form-control" id="modifyPrice" name="price" required>
                        </div>
                        <div class="form-group">
                            <label>描述</label>
                            <textarea class="form-control" rows="5" id="modifyDesc" name="description"></textarea>
                        </div>
                        <div class="form-group">
                            <label>更换图片 (可选)</label>
                            <input type="file" class="form-control-file" name="mainImage">
                        </div>
                        <div class="text-center">
                            <button type="submit" class="btn btn-primary">保存修改</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script type="text/javascript">
        // 1. 初始化 CKEditor
        // 必须放在 document ready 或者确保页面加载后执行
        $(function() {
            if (typeof CKEDITOR !== 'undefined') {
                CKEDITOR.replace('modifyDesc', {
                    // 配置图片上传接口 (与 publishItem.html 一致)
                    filebrowserImageUploadUrl: '/item/uploadImage',
                    uploadUrl: '/item/uploadImage',
                    height: 300
                });
            }
        });

        // 2. 打开模态框并填充数据
        function openModifyModal(id, name, categoryId, price, description) {
            $('#modifyId').val(id);
            $('#modifyName').val(name);
            $('#modifyCategory').val(categoryId);
            $('#modifyPrice').val(price);

            // 【关键修改】处理富文本回显
            // 不能直接用 val()，必须通过 CKEditor 实例的 setData 方法
            if (typeof CKEDITOR !== 'undefined' && CKEDITOR.instances.modifyDesc) {
                CKEDITOR.instances.modifyDesc.setData(description);
            } else {
                // 如果 CKEditor 没加载出来，降级处理
                $('#modifyDesc').val(description);
            }

            $('#myModalModify').modal('show');
        }

        // 3. 提交表单前，将 CKEditor 的内容同步回 textarea
        function syncEditorContent() {
            if (typeof CKEDITOR !== 'undefined') {
                for (instance in CKEDITOR.instances) {
                    CKEDITOR.instances[instance].updateElement();
                }
            }
            return true;
        }
    </script>
</div>
</body>
</html>
