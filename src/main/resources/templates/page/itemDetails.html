<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>商品详情</title>
</head>
<body>
<div id="b">
    <div class="row" style="margin-top: 20px">
        <div class="col-md-3 d-none d-md-block">
            <div th:replace="~{common/menuSortAndRecommend::#m}"></div>
        </div>

        <div class="col-md-9">
            <div class="card shadow-sm">
                <div class="card-body">
                    <div class="row">
                        <div class="col-md-5">
                            <img th:src="@{'/static/images/articleImage/'+${item.coverImage}}"
                                 class="img-fluid rounded"
                                 alt="商品图片"
                                 style="width: 100%; max-height: 400px; object-fit: contain; border: 1px solid #eee;"
                                 onerror="this.src='/static/images/logo.png'">
                        </div>
                        <div class="col-md-7">
                            <h3 th:text="${item.name}" class="text-dark font-weight-bold mb-3"></h3>
                            <div class="mb-3">
                                <span class="badge badge-info" th:text="${item.categoryName}">分类</span>
                                <span class="text-muted ml-2">发布于 <span th:text="${#dates.format(item.releaseTime,'yyyy-MM-dd')}"></span></span>
                                <span class="text-muted ml-2">浏览 <span th:text="${item.viewCount}"></span> 次</span>
                            </div>

                            <h2 class="text-danger mb-4">
                                ￥<span th:text="${item.price}"></span>
                                <small class="text-muted" th:if="${item.originalPrice!=null}" style="font-size: 16px;">
                                    原价: <del>￥<span th:text="${item.originalPrice}"></span></del>
                                </small>
                            </h2>

                            <div class="alert alert-secondary" role="alert">
                                卖家：<strong th:text="${item.seller.nickName}"></strong>
                            </div>

                            <div class="mt-4">
                                <div th:if="${session.currentUser!=null}">

                                    <div th:if="${session.currentUser.id == item.userId}">
                                        <button class="btn btn-secondary disabled">这是您发布的商品</button>
                                        <a href="/item/my" class="btn btn-outline-primary ml-2">去管理</a>
                                    </div>

                                    <div th:if="${session.currentUser.id != item.userId}">

                                        <div th:if="${item.status == 1}">
                                            <button type="button" class="btn btn-danger btn-lg mr-2"
                                                    th:onclick="'javascript:reserve('+${item.id}+')'">
                                                <i class="fa fa-shopping-cart"></i> 立即预订
                                            </button>

                                            <button type="button" class="btn btn-success btn-lg mr-2" onclick="alert('请先预订商品，成功后即可查看卖家联系方式！')">
                                                <i class="fa fa-wechat"></i> 获取联系方式
                                            </button>

                                            <button type="button" class="btn btn-primary btn-lg" data-toggle="modal" data-target="#messageModal">
                                                <i class="fa fa-commenting-o"></i> 给我留言
                                            </button>
                                        </div>

                                        <div th:if="${item.status == 4}">
                                            <div th:if="${tradeOrder != null && tradeOrder.buyerId == session.currentUser.id}">
                                                <div class="alert alert-success">您已预订此商品！</div>
                                                <button type="button" class="btn btn-success btn-lg" data-toggle="modal" data-target="#contactModal">
                                                    <i class="fa fa-phone"></i> 获取卖家联系方式
                                                </button>
                                            </div>
                                            <div th:if="${tradeOrder == null || tradeOrder.buyerId != session.currentUser.id}">
                                                <button class="btn btn-secondary btn-lg disabled" disabled>商品已被预订</button>
                                            </div>
                                        </div>

                                        <div th:if="${item.status != 1 && item.status != 4}">
                                            <button class="btn btn-secondary btn-lg disabled" disabled>商品已下架或售出</button>
                                        </div>
                                    </div>
                                </div>

                                <div th:if="${session.currentUser==null}">
                                    <a href="/login" class="btn btn-primary btn-lg">登录后购买或留言</a>
                                </div>
                            </div>
                        </div>
                    </div>

                    <hr class="my-4">

                    <h4>商品详情</h4>
                    <div class="mt-3 p-3 bg-light rounded">
                        <div th:utext="${item.description}"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="contactModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">卖家联系方式</h5>
                    <button type="button" class="close" data-dismiss="modal">&times;</button>
                </div>
                <div class="modal-body">
                    <div th:if="${item.contactList != null && !item.contactList.isEmpty()}">
                        <ul class="list-group">
                            <li class="list-group-item d-flex justify-content-between align-items-center"
                                th:each="contact : ${item.contactList}">
                                <span th:text="${contact.name}"></span>
                                <strong th:text="${contact.content}" class="text-primary"></strong>
                            </li>
                        </ul>
                    </div>
                    <div th:if="${item.contactList == null || item.contactList.isEmpty()}" class="text-center text-muted">
                        <p>卖家暂未留下联系方式，请尝试通过站内留言联系。</p>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-dismiss="modal">关闭</button>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="messageModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">给卖家留言</h5>
                    <button type="button" class="close" data-dismiss="modal">&times;</button>
                </div>
                <form action="/item/sendMessage" method="post">
                    <div class="modal-body">
                        <input type="hidden" name="itemId" th:value="${item.id}">
                        <div class="form-group">
                            <label>留言内容：</label>
                            <textarea class="form-control" name="content" rows="4" placeholder="您好，请问这个商品还在吗？可以小刀吗？" required></textarea>
                        </div>
                    </div>
                    <div class="modal-footer">
                        <button type="submit" class="btn btn-primary" onclick="alert('留言发送成功！卖家将在“我的消息”中看到。')">发送</button>
                        <button type="button" class="btn btn-secondary" data-dismiss="modal">取消</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

</div>
</body>
</html>
