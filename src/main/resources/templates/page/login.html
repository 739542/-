<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>用户登录</title>
</head>
<body>
<div id="b">
    <div class="col-md-6" style="margin-left: 25%">
        <form role="form" method="post" action="/user/login">
            <h3 style="text-align: center">用户登录&nbsp;&nbsp;</h3>

            <div class="form-group">
                <p class="help-block" style="float: right">没有账号?去<a href="/register"><span
                        class="badge badge-pill badge-info" style="color: white">注册</span></a></p>
            </div>

            <div class="form-group" th:if="${errorInfo!=null}">
                <div class="alert alert-danger" role="alert">
                    <i class="fa fa-exclamation-circle"></i> <span th:text="${errorInfo}"></span>
                </div>
            </div>

            <div class="form-group">
                <label for="userName">用户名</label>
                <input type="text" class="form-control" id="userName" name="username"
                       th:value="${user!=null ? user.username : ''}"
                       placeholder="请输入用户名" required="required">
            </div>

            <div class="form-group">
                <label for="password">密码</label>
                <input type="password" class="form-control" id="password" name="password"
                       placeholder="请输入密码" required="required">
            </div>

            <div class="form-group">
                <p class="help-block">忘记密码?去<a href="/user/forget"><span class="badge badge-pill badge-warning" style="color: white">找回密码</span></a>
                </p>
            </div>

            <div style="text-align: center">
                <button type="submit" class="btn btn-primary btn-block">立即登录</button>
            </div>
        </form>
    </div>
</div>
</body>
</html>
