<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>我的留言</title>
</head>
<body>
<div id="b">
    <div class="row" style="margin-top: 5px">
        <div class="col-md-3">
            <div th:replace="~{common/menuPersonalHubs::#m}"></div>
        </div>
        <div class="col-md-9">
            <ol class="breadcrumb">
                <li class="breadcrumb-item"><a href="/">首页</a></li>
                <li class="breadcrumb-item"><a href="/user/center">个人中心</a></li>
                <li class="breadcrumb-item active">我的留言</li>
            </ol>

            <span th:if="${contactList != null && contactList.size() != 0}" style="float: right">
                当前有&nbsp;<span style="margin-top: 10px;color: red" th:text="${contactList.size()}"></span>&nbsp;条数据
            </span>

            <table class="table table-bordered table-striped table-hover table-borderless" th:if="${contactList != null && contactList.size() != 0}">
                <thead>
                <tr>
                    <th style="text-align: center">留言时间</th>
                    <th style="text-align: center">内容</th>
                    <th style="text-align: center">回复</th>
                    <th style="text-align: center">操作</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="contact : ${contactList}">
                    <td th:text="${#dates.format(contact.createTime,'yyyy-MM-dd HH:mm:ss')}" style="text-align: center"></td>
                    <td th:text="${#strings.abbreviate(contact.content,15)}" style="text-align: center" th:title="${contact.content}"></td>

                    <td th:if="${contact.reply==null}" style="color: red;text-align: center">未答复</td>
                    <td th:if="${contact.reply!=null}" th:text="${#strings.abbreviate(contact.reply,15)}" th:title="${contact.reply}" style="color: #0c9076;text-align: center"></td>

                    <td style="text-align: center">
                        <button type="button" class="btn btn-primary btn-sm status-icon hint--top" aria-label="查看详情"
                                th:onclick="openViewModal([[${contact.id}]], [[${#dates.format(contact.createTime,'yyyy-MM-dd HH:mm:ss')}]], [[${contact.content}]], [[${contact.reply}]])">
                            <i class="fa fa-search"></i>
                        </button>

                        <button type="button" class="btn btn-info btn-sm status-icon hint--top" aria-label="修改"
                                th:if="${contact.reply == null}"
                                th:onclick="openEditModal([[${contact.id}]], [[${contact.content}]])">
                            <i class="fa fa-pencil"></i>
                        </button>

                        <a th:href="@{/feedback/delete(id=${contact.id})}" onclick="return confirm('确定要删除这条留言吗？')">
                            <button type="button" class="btn btn-danger btn-sm status-icon hint--top" aria-label="删除">
                                <i class="fa fa-trash-o"></i>
                            </button>
                        </a>
                    </td>
                </tr>
                </tbody>
            </table>

            <div th:if="${contactList == null || contactList.size() == 0}">
                <span style="color: red">无数据</span>
            </div>
        </div>
    </div>

    <div class="modal fade" id="myModalView">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h4 class="modal-title">查看留言详情</h4>
                    <button type="button" class="close" data-dismiss="modal">&times;</button>
                </div>
                <div class="modal-body">
                    <p>编号：<span id="viewId" style="color: #0000FF"></span></p>
                    <p>留言时间：<span id="viewTime" style="color: #0000FF"></span></p>
                    <p>留言内容：<span id="viewContent" style="color: #0000FF"></span></p>
                    <p>留言答复：<span id="viewReply" style="color: #0000FF"></span></p>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-danger" data-dismiss="modal">关闭</button>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="myModalEdit">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h4 class="modal-title">修改留言</h4>
                    <button type="button" class="close" data-dismiss="modal">&times;</button>
                </div>
                <div class="modal-body">
                    <form role="form" method="post" action="/feedback/save">
                        <input type="hidden" class="form-control" id="editId" name="id">
                        <div class="form-group">
                            <label>内容</label>
                            <textarea class="form-control" rows="6" id="editContent" name="content" required></textarea>
                        </div>
                        <div style="text-align: center">
                            <button type="submit" class="btn btn-primary">提交</button>
                            <button type="button" class="btn btn-danger" data-dismiss="modal">取消</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script>
        function openViewModal(id, time, content, reply) {
            $('#viewId').text(id);
            $('#viewTime').text(time);
            $('#viewContent').text(content);
            $('#viewReply').text(reply ? reply : '未答复');
            $('#myModalView').modal('show');
        }

        function openEditModal(id, content) {
            $('#editId').val(id);
            $('#editContent').val(content);
            $('#myModalEdit').modal('show');
        }
    </script>
</div>
</body>
</html>
