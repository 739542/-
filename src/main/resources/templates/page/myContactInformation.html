<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>
<div id="b">
    <div class="row" style="margin-top: 5px">
        <div class="col-md-3">
            <div th:replace="~{common/menuPersonalHubs::#m}"></div>
        </div>
        <div class="col-md-9">
            <ol class="breadcrumb">
                <li class="breadcrumb-item"><a href="/">首页</a></li>
                <li class="breadcrumb-item"><a href="/user/center">个人中心</a></li>
                <li class="breadcrumb-item active">联系方式</li>
            </ol>
            <form action="/contact/my" method="post">
                <div class="row" style="margin-left: 3px">
                    <input type="text" class="form-control" id="name" name="name" style="width: 200px" th:value="${name}"
                           placeholder="请输入联系方式名称...">
                    <button type="submit" class="btn btn-primary" style="margin-left: 2px"><i class="fa fa-search"></i>
                    </button>
                    <button type="button" class="btn btn-primary" style="margin-left: 2px" data-toggle="modal"
                            data-target="#myModalAdd">添加
                    </button>
                </div>
            </form>
            <span style="color: #0c9076" th:if="${contactInformationList.size()!=0}">买家将通过你的联系方式与你进行沟通</span>
            <span style="color: red;margin-top: 4px" th:if="${contactInformationList.size()==0}">无数据</span>
            <span th:if="${contactInformationList.size()!=0}" style="float: right">当前有&nbsp;<span style="margin-top: 10px;color: red" th:text="${contactInformationList.size()}"></span>&nbsp;条数据</span>
            <div th:if="${contactInformationList.size()!=0}">
                <table class="table table-bordered table-striped table-hover table-borderless" style="margin-top: 4px">
                    <thead>
                    <tr>
                        <th style="text-align: center">名称</th>
                        <th style="text-align: center">内容</th>
                        <th style="text-align: center">操作</th>
                    </tr>
                    </thead>
                    <tbody>
                    <div th:each="contactInformation:${contactInformationList}">
                        <tr>
                            <td style="text-align: center" th:text="${contactInformation.name}"></td>
                            <td style="text-align: center" th:text="${contactInformation.content}"></td>
                            <td style="text-align: center">
                                <a th:href="|javascript:openViewModal('${contactInformation.name}', '${contactInformation.content}')|" style="text-decoration: none">
                                    <button type="button" class="btn btn-primary btn-sm status-icon hint--top"
                                            aria-label="查看详情"><i class="fa fa-search"></i></button>
                                </a>
                                <a th:href="|javascript:openEditModal(${contactInformation.id}, '${contactInformation.name}', '${contactInformation.content}')|" style="text-decoration: none">
                                    <button type="button" class="btn btn-info btn-sm status-icon hint--top"
                                            aria-label="修改"><i class="fa fa-pencil"></i></button>
                                </a>
                                <a th:href="@{/contact/delete(id=${contactInformation.id})}" onclick="return confirm('确定要删除吗？')">
                                    <button type="button" class="btn btn-danger btn-sm status-icon hint--top"
                                            style="margin-left: 2px" aria-label="删除"><i class="fa fa-trash-o"></i>
                                    </button>
                                </a>
                            </td>
                        </tr>
                    </div>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
    <div class="modal fade" id="myModalAdd">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h4 class="modal-title">添加联系方式</h4>
                    <button type="button" class="close" data-dismiss="modal">&times;</button>
                </div>
                <div class="modal-body">
                    <form role="form" method="post" action="/contact/save">
                        <div class="form-group">
                            <label for="nameAddContactInformationName">名称</label>
                            <input type="text" class="form-control" id="nameAddContactInformationName" name="name" required="required" placeholder="例如：微信、手机号">
                        </div>
                        <div class="form-group">
                            <label for="contentAdd">内容</label>
                            <input type="text" class="form-control" id="contentAdd" name="content" required="required">
                        </div>
                        <div style="text-align: center">
                            <button type="submit" class="btn btn-primary">提交</button>
                            <button type="button" class="btn btn-danger" data-dismiss="modal">取消</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
    <div class="modal fade" id="myModalModify">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h4 class="modal-title">修改联系方式</h4>
                    <button type="button" class="close" data-dismiss="modal">&times;</button>
                </div>
                <div class="modal-body">
                    <form role="form" method="post" action="/contact/save">
                        <input type="hidden" class="form-control" id="idModifyContactInformation" name="id">
                        <div class="form-group">
                            <label for="nameModifyContactInformation">名称</label>
                            <input type="text" class="form-control" id="nameModifyContactInformation" name="name" required="required">
                        </div>
                        <div class="form-group">
                            <label for="contentModifyContactInformation">内容</label>
                            <input type="text" class="form-control" id="contentModifyContactInformation" name="content" required="required">
                        </div>
                        <div style="text-align: center">
                            <button type="submit" class="btn btn-primary">提交</button>
                            <button type="button" class="btn btn-danger" data-dismiss="modal">取消</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
    <div class="modal fade" id="myModalSee">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h4 class="modal-title">查看联系方式</h4>
                    <button type="button" class="close" data-dismiss="modal">&times;</button>
                </div>
                <div class="modal-body">
                    <div class="form-group">
                        <label for="nameSeeContactInformation">名称</label>
                        <input type="text" class="form-control" id="nameSeeContactInformation" disabled="disabled">
                    </div>
                    <div class="form-group">
                        <label for="contentSeeContactInformation">内容</label>
                        <input type="text" class="form-control" id="contentSeeContactInformation" disabled="disabled">
                    </div>
                    <div style="text-align: center">
                        <button type="button" class="btn btn-danger" data-dismiss="modal">关闭</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        function openEditModal(id, name, content) {
            $('#idModifyContactInformation').val(id);
            $('#nameModifyContactInformation').val(name);
            $('#contentModifyContactInformation').val(content);
            $('#myModalModify').modal('show');
        }

        function openViewModal(name, content) {
            $('#nameSeeContactInformation').val(name);
            $('#contentSeeContactInformation').val(content);
            $('#myModalSee').modal('show');
        }
    </script>
</div>
</body>
</html>
