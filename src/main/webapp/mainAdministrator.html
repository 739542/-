<!DOCTYPE html>

<!--suppress ALL-->

<head>

    <meta charset="UTF-8">

    <title>后台管理系统 - CampusMarket</title>

    <link rel="short icon" href="/static/images/favicon.png">

    <link rel="stylesheet" type="text/css" href="/static/jquery-easyui-1.7.0/themes/metro-blue/easyui.css"/>

    <link rel="stylesheet" type="text/css" href="/static/jquery-easyui-1.7.0/themes/icon.css"/>

    <script type="text/javascript" src="/static/jquery-easyui-1.7.0/jquery.min.js"></script>

    <script type="text/javascript" src="/static/jquery-easyui-1.7.0/jquery.easyui.min.js"></script>

    <script type="text/javascript" src="/static/jquery-easyui-1.7.0/locale/easyui-lang-zh_CN.js"></script>

    <script type="text/javascript">

        // 打开新标签页
        function openTab(text, url, iconCls){
            if($("#tabs").tabs("exists", text)){
                $("#tabs").tabs("select", text);
            }else{
                var content = "<iframe frameborder=0 scrolling='auto' style='width:100%;height:100%' src='/admin/" + url + "'></iframe>";
                $("#tabs").tabs("add", {
                    title: text,
                    iconCls: iconCls,
                    closable: true,
                    content: content
                });
            }
        }

        // 安全退出
        function logout(){
            $.messager.confirm("系统提示", "您确定要退出系统吗？", function(r){
                if(r){
                    window.location.href = "/user/logout";
                }
            });
        }
    </script>
</head>
<body class="easyui-layout">
<div region="north" style="height: 78px;background-color: #E0ECFF">
    <table style="padding: 5px" width="100%">
        <tr>
            <td width="50%">
                <h2 style="margin:0 0 0 20px;">SWU 含弘易物平台 - 后台管理</h2>
            </td>
            <td valign="bottom" align="right" width="50%">
                <font size="3">&nbsp;&nbsp;<strong>欢迎：</strong>管理员</font>
            </td>
        </tr>
    </table>
</div>

<div region="west" style="width: 200px" title="导航菜单" split="true">
    <div class="easyui-accordion" data-options="fit:true,border:false">

        <div title="商品管理" data-options="selected:true,iconCls:'icon-goodsManage'" style="padding: 10px">
            <a href="javascript:openTab('闲置物品管理','goodsManage.html','icon-goodsManage')" class="easyui-linkbutton" data-options="plain:true,iconCls:'icon-goodsManage'" style="width: 150px">闲置物品管理</a>
            <a href="javascript:openTab('物品分类管理','goodsTypeManage.html','icon-goodsTypeManage')" class="easyui-linkbutton" data-options="plain:true,iconCls:'icon-goodsTypeManage'" style="width: 150px">物品分类管理</a>
        </div>

        <div title="交易管理" data-options="iconCls:'icon-payRecordManage'" style="padding: 10px">
            <a href="javascript:openTab('订单/记录管理','reserveRecordManage.html','icon-payRecordManage')" class="easyui-linkbutton" data-options="plain:true,iconCls:'icon-payRecordManage'" style="width: 150px">订单/记录管理</a>
        </div>

        <div title="用户管理" data-options="iconCls:'icon-userManage'" style="padding: 10px">
            <a href="javascript:openTab('用户管理','userManage.html','icon-userManage')" class="easyui-linkbutton" data-options="plain:true,iconCls:'icon-userManage'" style="width: 150px">用户管理</a>
        </div>

        <div title="系统管理" data-options="iconCls:'icon-item'" style="padding: 10px">
            <a href="javascript:openTab('系统消息/通知','messageManage.html','icon-messageManage')" class="easyui-linkbutton" data-options="plain:true,iconCls:'icon-messageManage'" style="width: 150px">系统消息/通知</a>
            <a href="javascript:openTab('留言/反馈管理','contactManage.html','icon-contactManage')" class="easyui-linkbutton" data-options="plain:true,iconCls:'icon-contactManage'" style="width: 150px">留言/反馈管理</a>
            <a href="javascript:logout()" class="easyui-linkbutton" data-options="plain:true,iconCls:'icon-exit'" style="width: 150px">安全退出</a>
        </div>

    </div>
</div>

<div region="center">
    <div class="easyui-tabs" fit="true" border="false" id="tabs">
        <div title="首页" data-options="iconCls:'icon-home'">
            <div align="center" style="padding-top: 100px">
                <font color="red" size="10">欢迎使用SWU 含弘易物后台管理系统</font>
            </div>

</div>
